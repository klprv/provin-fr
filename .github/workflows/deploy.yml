name: Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit_hash=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Build static export
        env:
          NEXT_PUBLIC_COMMIT_HASH: ${{ steps.meta.outputs.commit_hash }}
          NEXT_PUBLIC_BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: npm run build

      - name: Deploy via SFTP to OVH
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.OVH_FTP_HOST }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          port: 22
          local_path: "./out/*"
          remote_path: "/home/proviny/www/"
          sftp_only: true
          delete_remote_files: false

      - name: Deployment summary
        if: success()
        run: |
          echo "::notice title=Deployment successful::Deployed commit ${{ steps.meta.outputs.commit_hash }} on ${{ steps.meta.outputs.build_date }} to provin.fr"